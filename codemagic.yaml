workflows:
  android-build:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
    scripts:
      - name: Build APK
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
