workflows:
  android-build:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.galleryboss.app"
    scripts:
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - your_email@example.com
